services:
  postgres:
    image: postgres:16-alpine
    container_name: syncrohws_postgres
    restart: unless-stopped
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_USER: syncrohws
      POSTGRES_PASSWORD: syncrohws
      POSTGRES_DB: syncrohws
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncrohws"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: syncrohws_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-syncrohws}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-syncrohws_secret}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    container_name: syncrohws_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://syncrohws:syncrohws@postgres:5432/syncrohws
      MINIO_URL: http://minio:9000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./src:/app/apps/backend/src

  # PowerSync self-hosted — uncomment when ready to enable real-time sync
  # powersync:
  #   image: journeyapps/powersync-service:latest
  #   container_name: syncrohws_powersync
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     PS_DATABASE_URL: postgresql://syncrohws:syncrohws@postgres:5432/syncrohws
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
  minio_data:
